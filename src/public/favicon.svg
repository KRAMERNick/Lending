<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="drumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c2a389;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a88c73;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8bfa6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="100" height="100" fill="#1c1917" rx="20"/>
  
  <!-- Барабан -->
  <ellipse cx="50" cy="45" rx="25" ry="8" fill="url(#drumGradient)" opacity="0.3"/>
  <rect x="25" y="37" width="50" height="20" fill="url(#drumGradient)"/>
  <ellipse cx="50" cy="37" rx="25" ry="8" fill="#d8bfa6"/>
  
  <!-- Детали -->
  <line x1="30" y1="37" x2="30" y2="57" stroke="#a88c73" stroke-width="1.5"/>
  <line x1="50" y1="37" x2="50" y2="57" stroke="#a88c73" stroke-width="1.5"/>
  <line x1="70" y1="37" x2="70" y2="57" stroke="#a88c73" stroke-width="1.5"/>
  
  <!-- Палочки -->
  <line x1="35" y1="25" x2="42" y2="35" stroke="#d8bfa6" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="25" x2="58" y2="35" stroke="#d8bfa6" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Тарелка (символичная) -->
  <ellipse cx="75" cy="20" rx="12" ry="3" fill="url(#drumGradient)" opacity="0.7"/>
</svg>
